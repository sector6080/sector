<!DOCTYPE html>
<html lang="it">
<head>
    <!--Aggiunti meta tags per gestire le chace e garantire un refresh aggiornato (da vedere se vogliamo modificarlo per ricordare dei settings)-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Sistema Militare - Dashboard</title>

    <!-- Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=1.0.1">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-title">
                    <i class="fas fa-crosshairs"></i>
                    <h1>Sistema Militare - Dashboard</h1>
                </div>
                <button onclick="getData()" class="btn-success">
                    <i class="fas fa-sync-alt"></i> Aggiorna Dati
                </button>
            </div>
        </header>

        <div class="tabs-container">
            <div class="tabs">
                <div class="tab active" data-tab="register">
                    <i class="fas fa-user-plus"></i> Registrazione Unità
                </div>
                <div class="tab" data-tab="units">
                    <i class="fas fa-users"></i> Unità Registrate
                </div>
                <div class="tab" data-tab="orders">
                    <i class="fas fa-paper-plane"></i> Invia Ordini
                </div>
            </div>

            <!-- Registrazione Unità -->
            <div id="register" class="tab-content active">
                <div class="section-title">
                    <i class="fas fa-user-plus"></i>
                    <h2>Registra Nuova Unità</h2>
                </div>
                
                <div class="form-container">
                    <form id="registrationForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="matricola" class="required">
                                    <i class="fas fa-id-card"></i> Matricola
                                </label>
                                <input type="text" id="matricola" pattern="[A-Z]{3}-[0-9]+" required placeholder="ABC-123">
                                <small>Formato: ABC-123 (3 lettere maiuscole, trattino, numeri)</small>
                            </div>
                            
                            <div class="form-group">
                                <label for="nick" class="required">
                                    <i class="fas fa-user-tag"></i> Nickname (Discord)
                                </label>
                                <input type="text" id="nick" required placeholder="Inserisci il nickname">
                            </div>
                            
                            <div class="form-group">
                                <label for="tipo" class="required">
                                    <i class="fas fa-tags"></i> Tipo Unità
                                </label>
                                <select id="tipo" required>
                                    <option value="">Seleziona tipo</option>
                                    <option value="Fanteria">Fanteria</option>
                                    <option value="Motorizzata">Motorizzata</option>
                                    <option value="Corazzata">Corazzata</option>
                                    <option value="Artiglieria">Artiglieria</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="movimento" class="required">
                                    <i class="fas fa-walking"></i> Movimento
                                </label>
                                <input type="number" id="movimento" min="1" required placeholder="1">
                            </div>
                            
                            <div class="form-group">
                                <label for="visione" class="required">
                                    <i class="fas fa-eye"></i> Visione
                                </label>
                                <input type="number" id="visione" min="1" required placeholder="1">
                            </div>
                            
                            <div class="form-group">
                                <label for="armatura" class="required">
                                    <i class="fas fa-shield-alt"></i> Armatura
                                </label>
                                <input type="number" id="armatura" min="1" required placeholder="1">
                            </div>
                            
                            <div class="form-group">
                                <label for="rifornimenti" class="required">
                                    <i class="fas fa-boxes"></i> Capacità Rifornimenti
                                </label>
                                <input type="number" id="rifornimenti" min="1" required placeholder="1">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="componenti">
                                <i class="fas fa-cogs"></i> Componenti
                            </label>
                            <textarea id="componenti" rows="3" placeholder="Descrizione componenti..."></textarea>
                        </div>
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="password" class="required">
                                    <i class="fas fa-lock"></i> Password
                                </label>
                                <input type="password" id="password" required placeholder="Inserisci password">
                            </div>
                            
                            <div class="form-group">
                                <label for="confirmPassword" class="required">
                                    <i class="fas fa-lock"></i> Conferma Password
                                </label>
                                <input type="password" id="confirmPassword" required placeholder="Conferma password">
                            </div>
                        </div>
                        
                        <button type="submit">
                            <i class="fas fa-user-plus"></i> Registra Unità
                        </button>
                    </form>
                </div>
            </div>

            <!-- Unità Registrate -->
            <div id="units" class="tab-content">
                <div class="section-title">
                    <i class="fas fa-users"></i>
                    <h2>Unità Registrate</h2>
                </div>
                
                <div class="units-stats">
                    <div class="unit-stat">
                        <div class="unit-stat-value" id="approvedCount">0</div>
                        <div class="unit-stat-label">Approvate</div>
                    </div>
                    <div class="unit-stat">
                        <div class="unit-stat-value" id="pendingCount">0</div>
                        <div class="unit-stat-label">In Attesa</div>
                    </div>
                </div>
                
                <div id="unitsGrid" class="units-grid">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Caricamento unità in corso...</p>
                    </div>
                </div>
            </div>

            <!-- Invia Ordini -->
            <div id="orders" class="tab-content">
                <div class="section-title">
                    <i class="fas fa-paper-plane"></i>
                    <h2>Invia Ordini</h2>
                </div>
                
                <div class="card">
                    <div class="form-group">
                        <label for="orderUnit" class="required">
                            <i class="fas fa-user"></i> Seleziona Unitá
                        </label>
                        <select id="orderUnit" required>
                            <option value="">Caricamento unità approvate...</option>
                        </select>
                    </div>
                    
                    <div class="form-group" id="passwordSection" style="display: none;">
                        <label for="unitPassword" class="required">
                            <i class="fas fa-lock"></i> Password Unitá
                        </label>
                        <input type="password" id="unitPassword" placeholder="Inserisci password unità">
                    </div>
                    
                    <div id="orderForm" style="display: none;">
                        <div class="form-group">
                            <label for="orderType" class="required">
                                <i class="fas fa-tasks"></i> Tipo Ordine
                            </label>
                            <select id="orderType" required>
                                <option value="">Seleziona tipo ordine</option>
                                <option value="muoversi">Muoversi</option>
                                <option value="salire">Salire su Mezzo</option>
                                <option value="scendere">Scendere da Mezzo</option>
                                <option value="attivare">Attivare Componenti</option>
                                <option value="cura">Cura</option>
                                <option value="ricaricare">Ricaricare Componente</option>
                                <option value="cedere">Cedere Rifornimenti</option>
                            </select>
                        </div>
                        
                        <div id="orderDetails">
                            <!-- Dettagli dinamici -->
                        </div>
                        
                        <button onclick="addOrderToChain()" class="btn-success">
                            <i class="fas fa-plus"></i> Aggiungi alla Catena
                        </button>
                        
                        <div class="orders-list" id="orderChain" style="display: none;">
                            <h3 class="card-title">
                                <i class="fas fa-link"></i> Catena Ordini
                            </h3>
                            <div id="orderItems"></div>
                            <button onclick="submitAllOrders()" class="btn-success">
                                <i class="fas fa-rocket"></i> Invia Tutti gli Ordini
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="notification" class="notification">
        <i class="fas fa-check-circle"></i>
        <span id="notificationText">Operazione completata con successo!</span>
    </div>
    <script>
        const supabaseUrl = 'https://jnfqfowidqwrmmvxnvhe.supabase.co';
        const supabaseKey = 'sb_publishable_Lbh2m9zIjUCwEF6PVNbc4g_XkdJ7Gcz';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);
        let unit_data = [];

        function loadUnitsRegistered() {
            const grid = document.getElementById('unitsGrid');
            if (!grid) return;

            if (!unit_data) {
                grid.innerHTML = '<div class="loading">Nessuna unità registrata</div>';
                console.log('Nessuna unità registrata');
                return;
            }

            grid.innerHTML = '';
            unit_data.forEach(unit => {
                const card = document.createElement('div');
                card.className = `unit-card ${unit.approvata === 'SI' ? 'approved' : 'pending'}`;
                
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <strong>${unit.matricola}</strong>
                        <span class="status status-${unit.approvata === 'SI' ? 'approved' : 'pending'}">
                            ${unit.approvata === 'SI' ? 'APPROVATA' : 'IN ATTESA'}
                        </span>
                    </div>
                    <div>👤 ${unit.nick}</div>
                    <div>🎯 ${unit.tipo} | 📍 ${unit.posizione}</div>
                    <div>🚶 ${unit.movimento}m | 👁️ ${unit.visione}m | 🛡️ ${unit.armatura}</div>
                    <div>📦 Rifornimenti: ${unit.rifornimenti}</div>
                    <div>🔧 ${unit.componenti || 'Nessuno'}</div>
                `;
                
                grid.appendChild(card);
            });
        }

        function loadUnitsSummary() {
            const approvedCountEl = document.getElementById('approvedCount');
            const pendingCountEl = document.getElementById('pendingCount');
            const approvedCount = unit_data.filter(u => u.approvata === true).length;
            const pendingCount = unit_data.filter(u => u.approvata !== true).length;
            approvedCountEl.textContent = approvedCount;
            pendingCountEl.textContent = pendingCount;
        }

        function loadApprovedUnits() {
            const select = document.getElementById('orderUnit');
            select.innerHTML = '<option value="">Seleziona unità approvata...</option>';
            
            unit_data.forEach(unit => {
                const option = document.createElement('option');
                option.value = unit.matricola;
                option.textContent = `${unit.matricola}`;
                select.appendChild(option);
            });
        }

        function updateStats() {
            const total = allUnits.length;
            const approved = allUnits.filter(u => u.approvata === 'SI').length;
            const pending = total - approved;

            // Update elements only if they exist
            const totalUnitsEl = document.getElementById('totalUnits');
            if (totalUnitsEl) totalUnitsEl.textContent = total;
            
            const approvedUnitsEl = document.getElementById('approvedUnits');
            if (approvedUnitsEl) approvedUnitsEl.textContent = approved;
            
            const pendingUnitsEl = document.getElementById('pendingUnits');
            if (pendingUnitsEl) pendingUnitsEl.textContent = pending;

            const statsContainer = document.getElementById('statsContainer');
            if (statsContainer) {
                statsContainer.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${total}</div>
                        <div class="stat-label">Unitá Totali</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" style="color: #27ae60;">${approved}</div>
                        <div class="stat-label">Approvate</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" style="color: #f39c12;">${pending}</div>
                        <div class="stat-label">In Attesa</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" style="color: #3498db;">${currentOrders.length}</div>
                        <div class="stat-label">Ordini in Coda</div>
                    </div>
                `;
            }
        }

        function verifyData(prepared_data) {
            // Validazione matricola: esattamente 6 caratteri (ABC-123)
            if (!prepared_data.matricola || !/^[A-Z]{3}-[0-9]{3}$/.test(prepared_data.matricola)) {
                showNotification('Matricola deve essere nel formato ABC-123 (esattamente 6 caratteri)', 'error');
                return false;
            }
            
            // Validazione password - min 4 caratteri
            if (!prepared_data.password || prepared_data.password.length < 4) {
                showNotification('La password deve essere lunga almeno 4 caratteri', 'error');
                return false;
            }
            
            // Verifica password e conferma
            if (prepared_data.password !== document.getElementById('confirmPassword').value) {
                showNotification('Le password non corrispondono!', 'error');
                return false;
            }
            
            // Validazione nick: min 4, max 50 caratteri
            if (!prepared_data.nick || prepared_data.nick.length < 4 || prepared_data.nick.length > 50) {
                showNotification('Il nickname deve essere tra 4 e 50 caratteri', 'error');
                return false;
            }
            
            if (!prepared_data.tipo) {
                showNotification('Il tipo è obbligatorio', 'error');
                return false;
            }
            
            // Validazione movimento: 0-49
            if (isNaN(prepared_data.movimento) || prepared_data.movimento < 0 || prepared_data.movimento >= 50) {
                showNotification('Movimento deve essere tra 0 e 49', 'error');
                return false;
            }
            
            // Validazione visione: 0-49
            if (isNaN(prepared_data.visione) || prepared_data.visione < 0 || prepared_data.visione >= 50) {
                showNotification('Visione deve essere tra 0 e 49', 'error');
                return false;
            }
            
            // Validazione armatura: 0-49
            if (isNaN(prepared_data.armatura) || prepared_data.armatura < 0 || prepared_data.armatura >= 50) {
                showNotification('Armatura deve essere tra 0 e 49', 'error');
                return false;
            }
            
            // Validazione rifornimenti: 0-49
            if (isNaN(prepared_data.rifornimenti) || prepared_data.rifornimenti < 0 || prepared_data.rifornimenti >= 50) {
                showNotification('Rifornimenti deve essere tra 0 e 49', 'error');
                return false;
            }
            
            // Validazione rifornimenti_max: 0-49
            if (isNaN(prepared_data.rifornimenti_max) || prepared_data.rifornimenti_max < 0 || prepared_data.rifornimenti_max >= 50) {
                showNotification('Rifornimenti massimi deve essere tra 0 e 49', 'error');
                return false;
            }
            
            // Validazione componenti: max 500 caratteri
            if (prepared_data.componenti && prepared_data.componenti.length > 500) {
                showNotification('Componenti non può superare 500 caratteri', 'error');
                return false;
            }
            
            // Verifica duplicati di matricola
            if (unit_data && unit_data.some(unit => unit.matricola === prepared_data.matricola)) {
                showNotification('Questa matricola è già registrata', 'error');
                return false;
            }
            
            // Verifica duplicati di nick
            if (unit_data && unit_data.some(unit => unit.nick === prepared_data.nick)) {
                showNotification('Questo nickname è già registrato', 'error');
                return false;
            }
            unit_data.some(unit => console.log(unit.nick));
            console.log('Nickname inserito:', prepared_data.nick);
            
            return true;
        }

        async function getData() {
            const {data, unit_error } = await sb.from('units').select('*');
            if (unit_error) {
                console.error('Unit Error:', unit_error);
            }
            unit_data = data;
            console.log('Unit Data:', unit_data);
        }

        async function sendData(table, data) {
            const { error } = await sb.from(table).insert([data]);
            if (error) {
                showNotification('Errore invio dati: ' + error.message, 'error');
                console.error('Errore invio dati:', error);
            } else {
                showNotification('Unità registrata con successo!', 'success');
                document.getElementById('registrationForm').reset();
                await getData();
            }
        }

        function setupEventListeners() {
            // Gestione tab
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    
                    tab.classList.add('active');
                    const tabContent = document.getElementById(tab.dataset.tab);
                    if (tabContent) {
                        tabContent.classList.add('active');
                    }
                    
                    if (tab.dataset.tab === 'units') {
                        loadUnitsRegistered();
                        loadUnitsSummary();
                    } else if (tab.dataset.tab === 'orders') {
                        loadApprovedUnits();
                    }
                });
            });

            // Selezione unità per ordini
            const orderUnitSelect = document.getElementById('orderUnit');
            if (orderUnitSelect) {
                orderUnitSelect.addEventListener('change', function() {
                    if (this.value) {
                        selectedUnit = this.value;
                        const pwdSection = document.getElementById('passwordSection');
                        if (pwdSection) pwdSection.style.display = 'block';
                        const pwdInput = document.getElementById('unitPassword');
                        if (pwdInput) pwdInput.value = '';
                    } else {
                        const pwdSection = document.getElementById('passwordSection');
                        if (pwdSection) pwdSection.style.display = 'none';
                        const orderForm = document.getElementById('orderForm');
                        if (orderForm) orderForm.style.display = 'none';
                        selectedUnit = null;
                    }
                });
            }

            // Prepara dati unità
            const registrationForm = document.getElementById('registrationForm');
            if (registrationForm) {
                registrationForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const prepared_data = {
                        matricola: document.getElementById('matricola').value.toUpperCase(),
                        password: document.getElementById('password').value,
                        nick: document.getElementById('nick').value,
                        tipo: document.getElementById('tipo').value,
                        movimento: parseInt(document.getElementById('movimento').value),
                        visione: parseInt(document.getElementById('visione').value),
                        armatura: parseInt(document.getElementById('armatura').value),
                        rifornimenti: parseInt(document.getElementById('rifornimenti').value),
                        rifornimenti_max: parseInt(document.getElementById('rifornimenti').value),
                        componenti: document.getElementById('componenti').value || null
                    };
                    // Valida i dati
                    if (verifyData(prepared_data)) {
                        await sendData('new_units', prepared_data);
                    }
                });
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            getData();
        });

        function showNotification(message, type) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => notification.classList.add('show'), 100);
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 4000);
        }

    </script>

    <!-- IFRAME NECESSARIO -->
    <iframe name="hiddenFrame" id="hiddenFrame" style="display: none;"></iframe>
</body>
</html>
