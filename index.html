<!DOCTYPE html>
<html lang="it">
<head>
    <!--Aggiunti meta tags per gestire le chace e garantire un refresh aggiornato (da vedere se vogliamo modificarlo per ricordare dei settings)-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Sistema Militare - Dashboard</title>

    <!-- Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=1.0.1">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-title">
                    <i class="fas fa-crosshairs"></i>
                    <h1>Sistema Militare - Dashboard</h1>
                </div>
                <button onclick="getData()" class="btn-success">
                    <i class="fas fa-sync-alt"></i> Aggiorna Dati
                </button>
            </div>
        </header>

        <div class="tabs-container">
            <div class="tabs">
                <div class="tab active" data-tab="register">
                    <i class="fas fa-user-plus"></i> Registrazione Unità
                </div>
                <div class="tab" data-tab="units">
                    <i class="fas fa-users"></i> Unità Registrate
                </div>
                <div class="tab" data-tab="orders">
                    <i class="fas fa-paper-plane"></i> Invia Ordini
                </div>
            </div>

            <!-- Registrazione Unità -->
            <div id="register" class="tab-content active">
                <div class="section-title">
                    <i class="fas fa-user-plus"></i>
                    <h2>Registra Nuova Unità</h2>
                </div>
                
                <div class="form-container">
                    <form id="registrationForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="matricola" class="required">
                                    <i class="fas fa-id-card"></i> Matricola
                                </label>
                                <input type="text" id="matricola" placeholder="ABC-123">
                                <small>Formato: ABC-123 (3 lettere maiuscole, trattino, numeri)</small>
                            </div>
                            
                            <div class="form-group">
                                <label for="nick" class="required">
                                    <i class="fas fa-user-tag"></i> Nickname (Discord)
                                </label>
                                <input type="text" id="nick" placeholder="Inserisci il nickname">
                            </div>
                            
                            <div class="form-group">
                                <label for="tipo" class="required">
                                    <i class="fas fa-tags"></i> Tipo Unità
                                </label>
                                <select id="tipo">
                                    <option value="">Seleziona tipo</option>
                                    <option value="Fanteria">Fanteria</option>
                                    <option value="Motorizzata">Motorizzata</option>
                                    <option value="Corazzata">Corazzata</option>
                                    <option value="Artiglieria">Artiglieria</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="movimento" class="required">
                                    <i class="fas fa-walking"></i> Movimento
                                </label>
                                <input type="number" id="movimento" placeholder="1">
                            </div>
                            
                            <div class="form-group">
                                <label for="visione" class="required">
                                    <i class="fas fa-eye"></i> Visione
                                </label>
                                <input type="number" id="visione" placeholder="1">
                            </div>
                            
                            <div class="form-group">
                                <label for="armatura" class="required">
                                    <i class="fas fa-shield-alt"></i> Armatura
                                </label>
                                <input type="number" id="armatura" placeholder="1">
                            </div>
                            
                            <div class="form-group">
                                <label for="rifornimenti" class="required">
                                    <i class="fas fa-boxes"></i> Capacità Rifornimenti
                                </label>
                                <input type="number" id="rifornimenti" placeholder="1">
                            </div>
                            
                            <div class="form-group">
                                <label for="hp" class="required">
                                    <i class="fas fa-heart"></i> HP (Punti Vita)
                                </label>
                                <input type="number" id="hp" placeholder="1">
                            </div>
                            
                            <div class="form-group">
                                <label for="pu_rimasti" class="required">
                                    <i class="fas fa-bolt"></i> PU Rimasti
                                </label>
                                <input type="number" id="pu_rimasti" placeholder="1">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="componenti">
                                <i class="fas fa-cogs"></i> Componenti
                            </label>
                            <textarea id="componenti" rows="3" placeholder="Descrizione componenti..."></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="lore">
                                <i class="fas fa-book"></i> Lore (Storia Unità)
                            </label>
                            <textarea id="lore" rows="4" placeholder="Racconta la storia e il background della tua unità..."></textarea>
                        </div>
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="password" class="required">
                                    <i class="fas fa-lock"></i> Password
                                </label>
                                <input type="password" id="password" placeholder="Inserisci password">
                            </div>
                            
                            <div class="form-group">
                                <label for="confirmPassword" class="required">
                                    <i class="fas fa-lock"></i> Conferma Password
                                </label>
                                <input type="password" id="confirmPassword" placeholder="Conferma password">
                            </div>
                        </div>
                        
                        <button type="submit">
                            <i class="fas fa-user-plus"></i> Registra Unità
                        </button>
                    </form>
                </div>
            </div>

            <!-- Unità Registrate -->
            <div id="units" class="tab-content">
                <div class="section-title">
                    <i class="fas fa-users"></i>
                    <h2>Unità Registrate</h2>
                </div>
                
                <div class="units-stats">
                    <div class="unit-stat">
                        <div class="unit-stat-value" id="approvedCount">0</div>
                        <div class="unit-stat-label">Approvate</div>
                    </div>
                    <div class="unit-stat">
                        <div class="unit-stat-value" id="pendingCount">0</div>
                        <div class="unit-stat-label">In Attesa</div>
                    </div>
                </div>
                
                <div id="unitsGrid" class="units-grid">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Caricamento unità in corso...</p>
                    </div>
                </div>
            </div>

            <!-- Invia Ordini -->
            <div id="orders" class="tab-content">
                <div class="section-title">
                    <i class="fas fa-paper-plane"></i>
                    <h2>Invia Ordini</h2>
                </div>
                
                <div class="card">
                    <div class="form-group">
                        <label for="orderUnit" class="required">
                            <i class="fas fa-user"></i> Seleziona Unitá
                        </label>
                        <select id="orderUnit">
                            <option value="">Caricamento unità approvate...</option>
                        </select>
                    </div>
                    
                    <div class="form-group" id="passwordSection" style="display: none;">
                        <label for="unitPassword" class="required">
                            <i class="fas fa-lock"></i> Password Unitá
                        </label>
                        <input type="password" id="unitPassword" placeholder="Inserisci password unità">
                    </div>
                    
                    <div id="orderForm" style="display: none;">
                        <div class="form-group">
                            <label for="orderType" class="required">
                                <i class="fas fa-tasks"></i> Tipo Ordine
                            </label>
                            <select id="orderType">
                                <option value="">Seleziona tipo ordine</option>
                                <option value="muoversi">Muoversi</option>
                                <option value="salire">Salire su Mezzo</option>
                                <option value="scendere">Scendere da Mezzo</option>
                                <option value="attivare">Attivare Componenti</option>
                                <option value="cura">Cura</option>
                                <option value="ricaricare">Ricaricare Componente</option>
                                <option value="cedere">Cedere Rifornimenti</option>
                            </select>
                        </div>
                        
                        <div id="orderDetails">
                            <!-- Dettagli dinamici -->
                        </div>
                        
                        <button onclick="addOrderToChain()" class="btn-success">
                            <i class="fas fa-plus"></i> Aggiungi alla Catena
                        </button>
                        
                        <div class="orders-list" id="orderChain" style="display: none;">
                            <h3 class="card-title">
                                <i class="fas fa-link"></i> Catena Ordini
                            </h3>
                            <div id="orderItems"></div>
                            <button onclick="submitAllOrders()" class="btn-success">
                                <i class="fas fa-rocket"></i> Invia Tutti gli Ordini
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="notification" class="notification">
        <i class="fas fa-check-circle"></i>
        <span id="notificationText">Operazione completata con successo!</span>
    </div>
    <script>
        const supabaseUrl = 'https://jnfqfowidqwrmmvxnvhe.supabase.co';
        const supabaseKey = 'sb_publishable_Lbh2m9zIjUCwEF6PVNbc4g_XkdJ7Gcz';
        const sb = window.supabase.createClient(supabaseUrl, supabaseKey);
        let unit_data = [];
        let selectedUnit = null;
        let orderChainArray = [];

        function loadUnitsRegistered() {
            const grid = document.getElementById('unitsGrid');
            if (!grid) return;

            if (!unit_data) {
                grid.innerHTML = '<div class="loading">Nessuna unità registrata</div>';
                console.log('Nessuna unità registrata');
                return;
            }

            grid.innerHTML = '';
            unit_data.forEach(unit => {
                const card = document.createElement('div');
                card.className = `unit-card ${unit.approvata === true}`;
                
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <strong>${unit.matricola}</strong>
                        <span class="status status-${unit.approvata === true}">
                            ${unit.approvata === true}
                        </span>
                    </div>
                    <div>👤 ${unit.nick}</div>
                    <div>🎯 ${unit.tipo} | 📍 ${unit.posizione_x}, ${unit.posizione_y}</div>
                    <div>🚶 ${unit.movimento}m | 👁️ ${unit.visione}m | 🛡️ ${unit.armatura}</div>
                    <div>❤️ HP: ${unit.hp} | ⚡ PU: ${unit.pu_rimasti} | 📦 Rifornimenti: ${unit.rifornimenti}</div>
                    <div>🔧 ${unit.componenti || 'Nessuno'}</div>
                    ${unit.lore ? `<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #ddd; font-style: italic; font-size: 0.9em;">📖 ${unit.lore}</div>` : ''}
                `;
                
                grid.appendChild(card);
            });
        }

        function loadApprovedUnits() {
            const select = document.getElementById('orderUnit');
            select.innerHTML = '<option value="">Seleziona unità approvata...</option>';
            
            unit_data.forEach(unit => {
                const option = document.createElement('option');
                option.value = unit.matricola;
                option.textContent = `${unit.matricola}`;
                select.appendChild(option);
            });
        }

        function loadUnitsSummary() {
            const approved = unit_data.filter(u => u.approvata === true).length;
            const pending = unit_data.filter(u => u.approvata === false).length;

            // Update elements only if they exist
            const approvedCount = document.getElementById('approvedCount');
            if (approvedCount) approvedCount.textContent = approved;
            
            const pendingCount = document.getElementById('pendingCount');
            if (pendingCount) pendingCount.textContent = pending;
        }

        async function verifyData(prepared_data) {
            // Validazione campi obbligatori
            if (!prepared_data.matricola) {
                showNotification('Matricola è obbligatoria', 'error');
                return false;
            }
            
            if (!prepared_data.nick) {
                showNotification('Nickname è obbligatorio', 'error');
                return false;
            }
            
            if (!prepared_data.tipo) {
                showNotification('Tipo unità è obbligatorio', 'error');
                return false;
            }
            
            if (prepared_data.movimento === null || prepared_data.movimento === undefined || prepared_data.movimento === '') {
                showNotification('Movimento è obbligatorio', 'error');
                return false;
            }
            
            if (prepared_data.visione === null || prepared_data.visione === undefined || prepared_data.visione === '') {
                showNotification('Visione è obbligatoria', 'error');
                return false;
            }
            
            if (prepared_data.armatura === null || prepared_data.armatura === undefined || prepared_data.armatura === '') {
                showNotification('Armatura è obbligatoria', 'error');
                return false;
            }
            
            if (prepared_data.rifornimenti === null || prepared_data.rifornimenti === undefined || prepared_data.rifornimenti === '') {
                showNotification('Capacità Rifornimenti è obbligatoria', 'error');
                return false;
            }
            
            if (prepared_data.hp === null || prepared_data.hp === undefined || prepared_data.hp === '') {
                showNotification('HP è obbligatorio', 'error');
                return false;
            }
            
            if (prepared_data.pu_rimasti === null || prepared_data.pu_rimasti === undefined || prepared_data.pu_rimasti === '') {
                showNotification('PU Rimasti è obbligatorio', 'error');
                return false;
            }
            
            if (!prepared_data.password) {
                showNotification('Password è obbligatoria', 'error');
                return false;
            }
            
            // Validazione matricola: esattamente 6 caratteri (ABC-123)
            if (!/^[A-Z]{3}-[0-9]{3}$/.test(prepared_data.matricola)) {
                showNotification('Matricola deve essere nel formato ABC-123 (esattamente 6 caratteri)', 'error');
                return false;
            }
            
            // Validazione password - min 4 caratteri
            if (!prepared_data.password || prepared_data.password.length < 4) {
                showNotification('La password deve essere lunga almeno 4 caratteri', 'error');
                return false;
            }
            
            // Verifica password e conferma
            if (prepared_data.password !== document.getElementById('confirmPassword').value) {
                showNotification('Le password non corrispondono!', 'error');
                return false;
            }
            
            // Validazione nick: min 4, max 50 caratteri
            if (!prepared_data.nick || prepared_data.nick.length < 4 || prepared_data.nick.length > 50) {
                showNotification('Il nickname deve essere tra 4 e 50 caratteri', 'error');
                return false;
            }
            
            if (!prepared_data.tipo) {
                showNotification('Il tipo è obbligatorio', 'error');
                return false;
            }
            
            // Validazione movimento: 0-49
            if (isNaN(prepared_data.movimento) || prepared_data.movimento < 0 || prepared_data.movimento >= 50) {
                showNotification('Movimento deve essere tra 0 e 49', 'error');
                return false;
            }
            
            // Validazione visione: 0-49
            if (isNaN(prepared_data.visione) || prepared_data.visione < 0 || prepared_data.visione >= 50) {
                showNotification('Visione deve essere tra 0 e 49', 'error');
                return false;
            }
            
            // Validazione armatura: 0-49
            if (isNaN(prepared_data.armatura) || prepared_data.armatura < 0 || prepared_data.armatura >= 50) {
                showNotification('Armatura deve essere tra 0 e 49', 'error');
                return false;
            }
            
            // Validazione rifornimenti: 0-49
            if (isNaN(prepared_data.rifornimenti) || prepared_data.rifornimenti < 0 || prepared_data.rifornimenti >= 50) {
                showNotification('Rifornimenti deve essere tra 0 e 49', 'error');
                return false;
            }
            
            // Validazione rifornimenti_max: 0-49
            if (isNaN(prepared_data.rifornimenti_max) || prepared_data.rifornimenti_max < 0 || prepared_data.rifornimenti_max >= 50) {
                showNotification('Rifornimenti massimi deve essere tra 0 e 49', 'error');
                return false;
            }
            
            // Validazione HP: 0-49
            if (isNaN(prepared_data.hp) || prepared_data.hp < 0 || prepared_data.hp >= 50) {
                showNotification('HP deve essere tra 0 e 49', 'error');
                return false;
            }
            
            // Validazione PU Rimasti: 0-49
            if (isNaN(prepared_data.pu_rimasti) || prepared_data.pu_rimasti < 0 || prepared_data.pu_rimasti >= 50) {
                showNotification('PU Rimasti deve essere tra 0 e 49', 'error');
                return false;
            }
            
            // Validazione componenti: max 500 caratteri
            if (prepared_data.componenti && prepared_data.componenti.length > 500) {
                showNotification('Componenti non può superare 500 caratteri', 'error');
                return false;
            }
            
            // Validazione lore: max 1000 caratteri
            if (prepared_data.lore && prepared_data.lore.length > 1000) {
                showNotification('Lore non può superare 1000 caratteri', 'error');
                return false;
            }
            
            // Fetch fresh data to check for duplicates against both tables
            const { data: allUnits } = await sb.from('units').select('matricola, nick');
            const { data: newUnits } = await sb.from('new_units').select('matricola, nick');
            const allData = [...(allUnits || []), ...(newUnits || [])];
            
            // Verifica duplicati di matricola
            if (allData && allData.some(unit => unit.matricola === prepared_data.matricola)) {
                showNotification('Questa matricola è già registrata', 'error');
                return false;
            }
            
            // Verifica duplicati di nick
            if (allData && allData.some(unit => unit.nick === prepared_data.nick)) {
                showNotification('Questo nickname è già registrato', 'error');
                return false;
            }
            
            return true;
        }

        async function getData() {
            const {data, unit_error } = await sb.from('units').select('*');
            if (unit_error) {
                console.error('Unit Error:', unit_error);
            }
            unit_data = data;
            console.log('Unit Data:', unit_data);
        }

        async function sendData(endpoint, data) {
            try {
                if (endpoint === 'verify_unit') {
                    // Try to find the unit in the 'player' table first, then in 'units'
                    try {
                        const { data: result, error } = await sb
                            .from('player')
                            .select('password')
                            .eq('matricola', data.matricola)
                            .maybeSingle();
                        
                        if (result && result.password) {
                            const isValid = (result.password === data.password);
                            return { valid: isValid };
                        }
                    } catch (e) {
                        console.log('Player table query error:', e);
                    }
                    
                    // Fallback: try 'units' table
                    try {
                        const { data: result, error } = await sb
                            .from('units')
                            .select('password')
                            .eq('matricola', data.matricola)
                            .maybeSingle();
                        
                        if (result && result.password) {
                            const isValid = (result.password === data.password);
                            return { valid: isValid };
                        }
                    } catch (e) {
                        console.log('Units table query error:', e);
                    }
                    
                    // If no unit found in either table
                    return { valid: false };
                } else {
                    // Per altri endpoint (new_units, orders), inserisci i dati
                    const { error } = await sb.from(endpoint).insert([data]);
                    
                    if (error) {
                        showNotification('Errore invio dati: ' + error.message, 'error');
                        console.error('Errore invio dati:', error);
                        throw error;
                    } else {
                        showNotification('Dati inviati con successo!', 'success');
                        if (document.getElementById('registrationForm')) {
                            document.getElementById('registrationForm').reset();
                        }
                        await getData();
                        return { success: true };
                    }
                }
            } catch (error) {
                console.error('Errore in sendData:', error);
                showNotification('Errore durante l\'invio dei dati', 'error');
                return { valid: false, error: error.message };
            }
        }

        function validateOrderForm() {
            if (!selectedUnit) {
                showNotification('Seleziona una unità', 'error');
                return false;
            }

            const unitPassword = document.getElementById('unitPassword').value;
            if (!unitPassword) {
                showNotification('Inserisci la password dell\'unità', 'error');
                return false;
            }

            const orderType = document.getElementById('orderType').value;
            if (!orderType) {
                showNotification('Seleziona un tipo di ordine', 'error');
                return false;
            }

            return true;
        }

        function addOrderToChain() {
            if (!validateOrderForm()) {
                return;
            }

            const orderType = document.getElementById('orderType').value;

            const orderObj = {
                tipo: orderType,
                dettagli: {}
            };

            // Raccogli i dettagli in base al tipo di ordine
            const inputs = document.getElementById('orderDetails').querySelectorAll('input, textarea, select');
            inputs.forEach(input => {
                if (input.value) {
                    orderObj.dettagli[input.id] = input.value;
                }
            });

            orderChainArray.push(orderObj);
            displayOrderChain();
            showNotification('Ordine aggiunto alla catena', 'success');
        }

        function displayOrderChain() {
            const orderItems = document.getElementById('orderItems');
            const orderChain = document.getElementById('orderChain');
            
            if (orderChainArray.length === 0) {
                orderChain.style.display = 'none';
                return;
            }

            orderChain.style.display = 'block';
            orderItems.innerHTML = '';

            orderChainArray.forEach((order, index) => {
                const orderItem = document.createElement('div');
                orderItem.className = 'order-item';
                orderItem.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span>${index + 1}. ${order.tipo}</span>
                        <button onclick="removeOrder(${index})" class="btn-danger" style="padding: 5px 10px; font-size: 0.8em;">
                            <i class="fas fa-trash"></i> Rimuovi
                        </button>
                    </div>
                `;
                orderItems.appendChild(orderItem);
            });
        }

        function removeOrder(index) {
            orderChainArray.splice(index, 1);
            displayOrderChain();
        }

        async function verifyPassword(matricola, password) {
        try {
            const response = await fetch('https://jnfqfowidqwrmmvxnvhe.supabase.co/functions/v1/verify-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                matricola: matricola,
                password: password
            })
            });

            const data = await response.json();
            return data;
        } catch (error) {
            console.error('Verification error:', error);
            return { valid: false, error: error.message };
        }
        }

        async function submitAllOrders() {
            if (!validateOrderForm()) {
                return;
            }

            if (orderChainArray.length === 0) {
                showNotification('Aggiungi almeno un ordine', 'error');
                return;
            }

            const ordersData = {
                matricola: selectedUnit,
                ordini: orderChainArray,
                timestamp: new Date().toISOString()
            };

            const { error } = await sb.from('orders').insert([ordersData]);
            if (error) {
                showNotification('Errore invio ordini: ' + error.message, 'error');
                console.error('Errore invio ordini:', error);
            } else {
                showNotification('Ordini inviati con successo!', 'success');
                orderChainArray = [];
                displayOrderChain();
                document.getElementById('orderType').value = '';
                document.getElementById('orderDetails').innerHTML = '';
                document.getElementById('orderUnit').value = '';
                const orderForm = document.getElementById('orderForm');
                if (orderForm) orderForm.style.display = 'none';
            }
        }

        function setupEventListeners() {
            // Gestione tab
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    
                    tab.classList.add('active');
                    const tabContent = document.getElementById(tab.dataset.tab);
                    if (tabContent) {
                        tabContent.classList.add('active');
                    }
                    
                    if (tab.dataset.tab === 'units') {
                        loadUnitsRegistered();
                        loadUnitsSummary();
                    } else if (tab.dataset.tab === 'orders') {
                        loadApprovedUnits();
                    }
                });
            });

            // Selezione unità per ordini
            const orderUnitSelect = document.getElementById('orderUnit');
            if (orderUnitSelect) {
                orderUnitSelect.addEventListener('change', function() {
                    if (this.value) {
                        selectedUnit = this.value;
                        const pwdSection = document.getElementById('passwordSection');
                        if (pwdSection) pwdSection.style.display = 'block';
                        const pwdInput = document.getElementById('unitPassword');
                        if (pwdInput) pwdInput.value = '';
                        const orderForm = document.getElementById('orderForm');
                        if (orderForm) orderForm.style.display = 'none';
                    } else {
                        const pwdSection = document.getElementById('passwordSection');
                        if (pwdSection) pwdSection.style.display = 'none';
                        const orderForm = document.getElementById('orderForm');
                        if (orderForm) orderForm.style.display = 'none';
                        selectedUnit = null;
                    }
                });
            }

            // Verifica password unità
            const unitPasswordInput = document.getElementById('unitPassword');
            unitPasswordInput.addEventListener('change', async function() {
            if (this.value && selectedUnit) {
                const response = await verifyPassword(selectedUnit, this.value);
                
                if (response.valid) {
                showNotification('Password corretta! Puoi ora inserire gli ordini.', 'success');
                const orderForm = document.getElementById('orderForm');
                if (orderForm) orderForm.style.display = 'block';
                } else {
                showNotification('Password errata! Riprova.', 'error');
                this.value = '';
                const orderForm = document.getElementById('orderForm');
                if (orderForm) orderForm.style.display = 'none';
                }
            }
            });

            // Tipo ordine - popola dettagli dinamici
            const orderTypeSelect = document.getElementById('orderType');
            if (orderTypeSelect) {
                orderTypeSelect.addEventListener('change', function() {
                    const orderDetails = document.getElementById('orderDetails');
                    orderDetails.innerHTML = '';

                    const orderType = this.value;
                    
                    if (orderType === 'muoversi') {
                        orderDetails.innerHTML = `
                            <div class="form-group">
                                <label for="destinazione_x">Destinazione X</label>
                                <input type="number" id="destinazione_x" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label for="destinazione_y">Destinazione Y</label>
                                <input type="number" id="destinazione_y" placeholder="0">
                            </div>
                        `;
                    } else if (orderType === 'salire') {
                        orderDetails.innerHTML = `
                            <div class="form-group">
                                <label for="mezzo_tipo">Tipo Mezzo</label>
                                <input type="text" id="mezzo_tipo" placeholder="Es. Jeep, Tank...">
                            </div>
                        `;
                    } else if (orderType === 'scendere') {
                        orderDetails.innerHTML = `
                            <div class="form-group">
                                <label for="mezzo_id">ID Mezzo</label>
                                <input type="text" id="mezzo_id" placeholder="ID del mezzo">
                            </div>
                        `;
                    } else if (orderType === 'attivare') {
                        orderDetails.innerHTML = `
                            <div class="form-group">
                                <label for="componente_nome">Nome Componente</label>
                                <input type="text" id="componente_nome" placeholder="Nome del componente">
                            </div>
                        `;
                    } else if (orderType === 'cura') {
                        orderDetails.innerHTML = `
                            <div class="form-group">
                                <label for="hp_curati">HP da Curare</label>
                                <input type="number" id="hp_curati" placeholder="0">
                            </div>
                        `;
                    } else if (orderType === 'ricaricare') {
                        orderDetails.innerHTML = `
                            <div class="form-group">
                                <label for="componente_ricarica">Nome Componente</label>
                                <input type="text" id="componente_ricarica" placeholder="Nome del componente">
                            </div>
                            <div class="form-group">
                                <label for="quantita_ricarica">Quantità</label>
                                <input type="number" id="quantita_ricarica" placeholder="0">
                            </div>
                        `;
                    } else if (orderType === 'cedere') {
                        orderDetails.innerHTML = `
                            <div class="form-group">
                                <label for="unita_destinataria">Matric. Unità Destinataria</label>
                                <input type="text" id="unita_destinataria" placeholder="ABC-123">
                            </div>
                            <div class="form-group">
                                <label for="quantita_cedere">Quantità Rifornimenti</label>
                                <input type="number" id="quantita_cedere" placeholder="0">
                            </div>
                        `;
                    }
                });
            }

            // Prepara dati unità
            const registrationForm = document.getElementById('registrationForm');
            if (registrationForm) {
                registrationForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const prepared_data = {
                        matricola: document.getElementById('matricola').value.toUpperCase(),
                        password: document.getElementById('password').value,
                        nick: document.getElementById('nick').value,
                        tipo: document.getElementById('tipo').value,
                        movimento: parseInt(document.getElementById('movimento').value),
                        visione: parseInt(document.getElementById('visione').value),
                        armatura: parseInt(document.getElementById('armatura').value),
                        rifornimenti: parseInt(document.getElementById('rifornimenti').value),
                        rifornimenti_max: parseInt(document.getElementById('rifornimenti').value),
                        hp: parseInt(document.getElementById('hp').value),
                        pu_rimasti: parseInt(document.getElementById('pu_rimasti').value),
                        componenti: document.getElementById('componenti').value || null,
                        lore: document.getElementById('lore').value || null
                    };
                    // Valida i dati
                    console.log('Dati preparati per invio:');
                    if (await verifyData(prepared_data)) {
                        await sendData('new_units', prepared_data);
                    }
                });
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            await getData();
            setupEventListeners();
        });

        function showNotification(message, type) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => notification.classList.add('show'), 100);
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 4000);
        }

    </script>

    <!-- IFRAME NECESSARIO -->
    <iframe name="hiddenFrame" id="hiddenFrame" style="display: none;"></iframe>
</body>
</html>
